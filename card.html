<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>mObywatel</title>
    <meta name="viewport" content="width=device-width, initial-scale=0.8, user-scalable=no">
    <link rel="stylesheet" href="assets/main.css">
    <link rel="stylesheet" href="assets/id.css">
    <style>
        /* To dodajemy, żeby zdjęcie nie było rozciągnięte, ale pasowało do Twojej ramki */
        #photo_display {
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center bottom;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="container">
        <div class="top_bar">
            <div class="back" onclick="window.location.href='./id.html'">
                <img src="assets/images/back.png">
                <p>Wróć</p>
            </div>
            <p class="title">mDowód</p>
            <img class="help" src="assets/images/help.png">
        </div>

        <div class="time_box">
            <p id="current_time">Czas: --:--:-- --.--.----</p>
        </div>

        <div class="id_card">
            <div class="card_main">
                <div class="photo_column">
                    <div class="photo_box">
                        <div id="photo_display"></div>
                    </div>
                    <img class="flag" src="assets/images/pl_flag.png">
                    <img class="eagle" src="assets/images/eagle.png">
                </div>

                <div class="data_column">
                    <p class="val" id="name">IMIĘ</p>
                    <p class="label">Imię (imiona)</p>

                    <p class="val" id="surname">NAZWISKO</p>
                    <p class="label">Nazwisko</p>

                    <p class="val">POLSKIE</p>
                    <p class="label">Obywatelstwo</p>

                    <p class="val" id="birthday">--.--.----</p>
                    <p class="label">Data urodzenia</p>

                    <p class="val" id="pesel">--</p>
                    <p class="label">Numer PESEL</p>
                </div>
            </div>

            <div class="status_row">
                <img src="assets/images/check.png">
                <p>Dokument ważny</p>
            </div>
        </div>

        <div class="extra_data_box" style="margin: 20px; padding: 15px; background: white; border-radius: 10px;">
            <p class="label">Seria i numer</p>
            <p class="val" id="seriesAndNumber" style="font-size: 18px; margin-bottom: 10px;">--- ---</p>
            
            <div style="display: flex; justify-content: space-between;">
                <div>
                    <p class="label">Termin ważności</p>
                    <p class="val" id="expiryDate">--.--.----</p>
                </div>
                <div>
                    <p class="label">Data wydania</p>
                    <p class="val" id="givenDate">--.--.----</p>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom_menu">
        <div class="menu_item"><img src="assets/images/home.png"><p>Pulpit</p></div>
        <div class="menu_item active"><img src="assets/images/docs.png"><p>Dokumenty</p></div>
        <div class="menu_item"><img src="assets/images/services.png"><p>Usługi</p></div>
        <div class="menu_item"><img src="assets/images/qr.png"><p>Kod QR</p></div>
        <div class="menu_item"><img src="assets/images/more.png"><p>Więcej</p></div>
    </div>

    <script>
        // SKRYPT ŁĄCZĄCY TWOJE STARE STYLE Z NOWYMI DANYMI
        document.addEventListener('DOMContentLoaded', () => {
            const rawData = localStorage.getItem('userData');
            if (rawData) {
                const data = JSON.parse(rawData);

                // Wypełniamy pola Twoimi ID
                document.getElementById('name').innerText = data.name || "";
                document.getElementById('surname').innerText = data.surname || "";
                document.getElementById('pesel').innerText = data.pesel || "";
                
                if(data.day && data.month && data.year) {
                    document.getElementById('birthday').innerText = `${data.day}.${data.month}.${data.year}`;
                }

                if (data.image) {
                    document.getElementById('photo_display').style.backgroundImage = `url(${data.image})`;
                }

                // Dodatkowe pola realistyczne
                if (data.seriesAndNumber) document.getElementById('seriesAndNumber').innerText = data.seriesAndNumber;
                if (data.expiryDate) document.getElementById('expiryDate').innerText = data.expiryDate;
                if (data.givenDate) document.getElementById('givenDate').innerText = data.givenDate;
            }
        });

        // Dynamiczny zegar
        function updateTime() {
            const now = new Date();
            document.getElementById('current_time').innerText = `Czas: ${now.toLocaleTimeString('pl-PL')} ${now.toLocaleDateString('pl-PL')}`;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>

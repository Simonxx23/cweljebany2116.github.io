<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, user-scalable=no">
    <link rel="stylesheet" href="assets/main.css">
    <link rel="stylesheet" href="assets/id.css">
</head>
<body>
    <div class="background"></div>
    <div class="container">
        <div class="top_bar">
            <div class="back" onclick="window.location.href='./id.html'">
                <img src="assets/images/back.png">
                <p>Wróć</p>
            </div>
            <p class="title">mDowód</p>
            <img class="help" src="assets/images/help.png">
        </div>

        <div class="time_box">
            <p id="current_time">Czas: --:--:-- --.--.----</p>
        </div>

        <div class="id_card">
            <div class="card_main">
                <div class="photo_column">
                    <div class="photo_box" style="overflow: hidden;">
                        <div id="photo_display" style="width:100%; height:100%; background-size: cover; background-position: center;"></div>
                    </div>
                    <img class="flag" src="assets/images/pl_flag.png">
                    <img class="eagle" src="assets/images/eagle.png">
                </div>
                <div class="data_column">
                    <p class="val" id="name">IMIĘ</p>
                    <p class="label">Imię (imiona)</p>
                    <p class="val" id="surname">NAZWISKO</p>
                    <p class="label">Nazwisko</p>
                    <p class="val">POLSKIE</p>
                    <p class="label">Obywatelstwo</p>
                    <p class="val" id="birthday">--.--.----</p>
                    <p class="label">Data urodzenia</p>
                    <p class="val" id="pesel">--</p>
                    <p class="label">Numer PESEL</p>
                </div>
            </div>
            <div class="status_row">
                <img src="assets/images/check.png">
                <p>Dokument ważny</p>
            </div>
        </div>

        <div style="background: white; margin: 15px; padding: 15px; border-radius: 10px; color: black;">
            <p style="font-size: 10px; color: gray;">Seria i numer</p>
            <p id="seriesAndNumber" style="font-size: 20px; font-weight: bold; margin-bottom: 10px;">ABC 123456</p>
            
            <div style="display: flex; justify-content: space-between; border-top: 1px solid #eee; padding-top: 10px;">
                <div>
                    <p style="font-size: 10px; color: gray;">Termin ważności</p>
                    <p id="expiryDate" style="font-weight: bold;">--.--.----</p>
                </div>
                <div>
                    <p style="font-size: 10px; color: gray;">Data wydania</p>
                    <p id="givenDate" style="font-weight: bold;">--.--.----</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const rawData = localStorage.getItem('userData');
        if (rawData) {
            const data = JSON.parse(rawData);
            
            // Wstawianie danych do Twoich ID
            if(data.name) document.getElementById('name').innerText = data.name;
            if(data.surname) document.getElementById('surname').innerText = data.surname;
            if(data.pesel) document.getElementById('pesel').innerText = data.pesel;
            if(data.day) document.getElementById('birthday').innerText = `${data.day}.${data.month}.${data.year}`;
            
            // Wyświetlanie zdjęcia bez błędów 404
            if(data.image) document.getElementById('photo_display').style.backgroundImage = `url(${data.image})`;

            // Serie i daty
            if(data.seriesAndNumber) document.getElementById('seriesAndNumber').innerText = data.seriesAndNumber;
            if(data.expiryDate) document.getElementById('expiryDate').innerText = data.expiryDate;
            if(data.givenDate) document.getElementById('givenDate').innerText = data.givenDate;
        }

        // Zegar do filmu
        function updateTime() {
            const now = new Date();
            document.getElementById('current_time').innerText = `Czas: ${now.toLocaleTimeString('pl-PL')} ${now.toLocaleDateString('pl-PL')}`;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
        const rawData = localStorage.getItem('userData');
        
        if (rawData) {
            const data = JSON.parse(rawData);

            // Wyświetlanie zdjęcia profilowego
            const photoDiv = document.getElementById('photo_display');
            if (photoDiv && data.image) {
                photoDiv.style.backgroundImage = `url(${data.image})`;
                photoDiv.style.backgroundSize = 'cover';
                photoDiv.style.backgroundPosition = 'center';
            }

            // Wypełnianie danych - sprawdzamy obie możliwości nazw (day/month lub birthday)
            if(data.name) document.getElementById('name').innerText = data.name.toUpperCase();
            if(data.surname) document.getElementById('surname').innerText = data.surname.toUpperCase();
            
            // To naprawia PESEL - upewniamy się, że nazwa pasuje do index.js
            const peselValue = data.pesel || data.generatedPesel;
            if(peselValue) document.getElementById('pesel').innerText = peselValue;
            
            // Data urodzenia - obsługa dwóch formatów
            if(data.birthday) {
                document.getElementById('birthday').innerText = data.birthday;
            } else if(data.day && data.month && data.year) {
                document.getElementById('birthday').innerText = `${data.day}.${data.month}.${data.year}`;
            }

            // Dodatkowe pola (Seria, numer, daty)
            if(data.seriesAndNumber) document.getElementById('seriesAndNumber').innerText = data.seriesAndNumber;
            if(data.expiryDate) document.getElementById('expiryDate').innerText = data.expiryDate;
            if(data.givenDate) document.getElementById('givenDate').innerText = data.givenDate;
        }

        // Zegar czasu rzeczywistego
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('pl-PL');
            const dateStr = now.toLocaleDateString('pl-PL');
            
            const timeEl = document.getElementById('time');
            if (timeEl) timeEl.innerText = `Czas: ${timeStr} ${dateStr}`;
        }

        setInterval(updateTime, 1000);
        updateTime();
    });
  </script>
